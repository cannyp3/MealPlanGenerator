name: Generate Weekly Meal Plan

on:
  schedule:
    - cron: '0 10 * * 4' # Every Thursday at 10:00 AM UTC (approx 6:00 AM EDT)
  workflow_dispatch: # Allows manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate Meal Plan
        run: python meal_plan_generator.py
        
      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Generate meal plan" && git push)
